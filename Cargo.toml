[package]
name = "uvd"
version = "0.1.0"
edition = "2024"
description = "Unix Verified Disk"
license = "AGPL-3.0"
readme = "README.md"
keywords = ["unix", "disk", "verification", "cli"]
categories = ["command-line-utilities"]
repository = "https://github.com/kognitara/uvd"

[dependencies]
clap = "4.6.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
uuid = { version = "1.23.4", features = ["serde", "v4"] }
zip = "0.6.6"
